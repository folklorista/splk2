name: API Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'api/**'
      - 'dev/db.sql'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'api/**'
      - 'dev/db.sql'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: splk
        options: >-
          --health-cmd="mysql -uroot -proot -e 'SELECT 1'"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=10
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysql, curl, json
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: api

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-progress --prefer-dist --no-interaction
        working-directory: api

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..60}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1;" 2>/dev/null; then
              echo "✓ MySQL is ready!"
              exit 0
            fi
            echo "Waiting for MySQL... attempt $i/60"
            sleep 1
          done
          echo "✗ MySQL failed to start after 60 seconds"
          exit 1

      - name: Import database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < dev/db.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < api/migrations/add-soft-deletes.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < api/migrations/add-change-tracking.sql

      - name: Seed audit actions
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk -e "
          INSERT INTO audit_actions (id, name, description) VALUES
          (1, 'USER_LOGIN', 'Přihlášení uživatele'),
          (2, 'DATA_INSERT', 'Vložení nových dat'),
          (3, 'DATA_UPDATE', 'Aktualizace dat'),
          (4, 'DATA_DELETE', 'Smazání dat'),
          (5, 'TREE_UPDATE', 'Aktualizace stromové struktury');"

      - name: Run Unit Tests
        run: ./vendor/bin/phpunit tests/Unit/
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local
          CORS_ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
          RATE_LIMIT_GUEST: 10000
          RATE_LIMIT_USER: 10000

      - name: Create test .env for API Server
        run: |
          cat > api/.env << EOF
          APP_ENV=local
          DB_HOST=127.0.0.1:3306
          DB_USERNAME=root
          DB_PASSWORD=root
          DB_NAME=splk
          JWT_SECRET=my_little_secret
          CORS_ALLOWED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
          LOG_PATH=../../log/api/app.log
          LOG_LEVEL=DEBUG
          EOF

      - name: Start API Server
        run: |
          cd api
          # Clear rate limit cache from previous runs
          rm -rf ../../log/rate_limit 2>/dev/null || true
          php -S 127.0.0.1:8000 -t public > /tmp/api.log 2>&1 &
          API_PID=$!
          sleep 3
          # Verify server is running
          if curl -s http://127.0.0.1:8000/health > /dev/null; then
            echo "API server started successfully (PID: $API_PID)"
          else
            echo "API server failed to start"
            cat /tmp/api.log
            exit 1
          fi

      - name: Run Integration Tests (E2E)
        run: ./vendor/bin/phpunit tests/Integration/
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local
          CORS_ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
          RATE_LIMIT_GUEST: 10000
          RATE_LIMIT_USER: 10000
        continue-on-error: true

      - name: Clear rate limit cache after Integration Tests
        run: |
          echo "=== Killing PHP servers ==="
          pkill -f "php -S" || true
          sleep 1

          echo "=== Cache state BEFORE cleanup (Integration Tests) ==="
          if [ -d log/rate_limit ]; then
            echo "Cache files exist:"
            find log/rate_limit -type f 2>/dev/null | wc -l
          else
            echo "No cache directory"
          fi

          echo "=== Clearing cache ==="
          rm -rf log/rate_limit 2>/dev/null || true

          echo "=== Verify cache cleared ==="
          if [ -d log/rate_limit ]; then
            echo "ERROR: Cache still exists!"
            find log/rate_limit -type f 2>/dev/null | wc -l
          else
            echo "✓ Cache cleared successfully"
          fi
          sleep 1

      - name: Restart API Server for full test run
        run: |
          cd api

          # Kill any remaining PHP processes
          echo "=== Killing all PHP servers ==="
          pkill -f "php -S" || true
          sleep 2

          # Clear rate limit cache before starting server
          echo "=== Clearing cache ==="
          rm -rf ../log/rate_limit 2>/dev/null || true

          # Start server
          echo "=== Starting API server ==="
          echo "Checking .env file..."
          cat .env | head -10
          echo "Checking index.php syntax..."
          php -l public/index.php

          php -S 127.0.0.1:8000 -t public > /tmp/api.log 2>&1 &
          PHP_PID=$!
          echo "Started PHP with PID: $PHP_PID"

          echo "Waiting for server to start..."
          sleep 3

          # Verify server started
          echo "=== Testing health endpoint ==="
          HEALTH=$(curl -s --max-time 5 http://127.0.0.1:8000/health)
          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          echo "Response: $HEALTH"

          if [ $CURL_EXIT -eq 0 ] && echo "$HEALTH" | grep -q '"status"'; then
            echo "✓ API server started successfully"
          else
            echo "✗ API server failed to start"
            echo "=== PHP Log ==="
            tail -50 /tmp/api.log
            echo "=== Running PHP processes ==="
            ps aux | grep php | grep -v grep || echo "No PHP processes found"
            exit 1
          fi

      - name: Run All Tests with Coverage
        run: |
          ./vendor/bin/phpunit \
            --coverage-clover coverage.xml \
            --display-deprecations \
            --display-warnings
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local
          CORS_ALLOWED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
          RATE_LIMIT_GUEST: 10000
          RATE_LIMIT_USER: 10000

      - name: Check Health Endpoint
        run: |
          cd api
          echo "=== Testing Health Endpoint ==="

          # Debug: Show running PHP processes
          echo "=== Running PHP processes ==="
          ps aux | grep php || echo "No PHP processes found"

          # Verify API server is still running
          if ! pgrep -f "php -S 127.0.0.1:8000" > /dev/null; then
            echo "⚠ API server is not running, starting it..."
            echo "Current directory: $(pwd)"
            echo "Files in public/: $(ls public/ | head -10)"

            php -S 127.0.0.1:8000 -t public > /tmp/api.log 2>&1 &
            PHP_PID=$!
            echo "Started PHP server with PID: $PHP_PID"
            sleep 3

            # Check if server is actually running
            if ! kill -0 $PHP_PID 2>/dev/null; then
              echo "✗ PHP process died immediately"
              cat /tmp/api.log
              exit 1
            fi
          else
            echo "✓ API server is running"
          fi

          # Show server log before testing
          echo "=== API Server Log ==="
          cat /tmp/api.log 2>/dev/null || echo "No log file"

          # Test with verbose curl
          echo "=== Testing health endpoint with curl ==="
          HEALTH=$(curl -v --max-time 5 http://127.0.0.1:8000/health 2>&1)
          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          echo "Response:"
          echo "$HEALTH"

          # Verify it's valid JSON and contains 'status'
          HEALTH_JSON=$(echo "$HEALTH" | grep -E '^\{' | tail -1)
          if echo "$HEALTH_JSON" | grep -q '"status"'; then
            echo "✓ Health endpoint is working"
          else
            echo "✗ Health endpoint failed"
            echo "Expected JSON with 'status' field"
            exit 1
          fi

      - name: Upload Coverage Reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: api/coverage.xml
          fail_ci_if_error: false
