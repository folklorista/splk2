name: API Tests

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'api/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: splk
        options: >-
          --health-cmd="mysql -uroot -proot -e 'SELECT 1'"
          --health-interval=5s
          --health-timeout=10s
          --health-retries=10
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MySQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysql, curl, json
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        working-directory: api

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-progress --prefer-dist --no-interaction
        working-directory: api

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..60}; do
            if mysql -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1;" 2>/dev/null; then
              echo "✓ MySQL is ready!"
              exit 0
            fi
            echo "Waiting for MySQL... attempt $i/60"
            sleep 1
          done
          echo "✗ MySQL failed to start after 60 seconds"
          exit 1

      - name: Import database schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < dev/db.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < api/migrations/add-soft-deletes.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk < api/migrations/add-change-tracking.sql

      - name: Seed audit actions
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot splk -e "
          INSERT INTO audit_actions (id, name, description) VALUES
          (1, 'USER_LOGIN', 'Přihlášení uživatele'),
          (2, 'DATA_INSERT', 'Vložení nových dat'),
          (3, 'DATA_UPDATE', 'Aktualizace dat'),
          (4, 'DATA_DELETE', 'Smazání dat'),
          (5, 'TREE_UPDATE', 'Aktualizace stromové struktury');"

      - name: Run Unit Tests
        run: ./vendor/bin/phpunit tests/Unit/
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local

      - name: Create test .env for API Server
        run: |
          cat > api/.env << EOF
          APP_ENV=local
          DB_HOST=127.0.0.1:3306
          DB_USERNAME=root
          DB_PASSWORD=root
          DB_NAME=splk
          JWT_SECRET=my_little_secret
          LOG_PATH=../../log/api/app.log
          LOG_LEVEL=DEBUG
          EOF

      - name: Start API Server
        run: |
          cd api
          php -S 127.0.0.1:8000 -t public > /tmp/api.log 2>&1 &
          API_PID=$!
          sleep 3
          # Verify server is running
          if curl -s http://127.0.0.1:8000/health > /dev/null; then
            echo "API server started successfully (PID: $API_PID)"
          else
            echo "API server failed to start"
            cat /tmp/api.log
            exit 1
          fi

      - name: Run Integration Tests (E2E)
        run: ./vendor/bin/phpunit tests/Integration/
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local
        continue-on-error: true

      - name: Run All Tests with Coverage
        run: ./vendor/bin/phpunit --coverage-text
        working-directory: api
        env:
          DB_HOST: 127.0.0.1:3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: splk
          APP_ENV: local

      - name: Check Health Endpoint
        run: |
          echo "Testing Health Endpoint..."
          HEALTH=$(curl -s http://localhost:8000/health)
          echo "Health response: $HEALTH"

          # Verify it's valid JSON and contains 'operational' or 'degraded'
          if echo "$HEALTH" | grep -q '"status"'; then
            echo "✓ Health endpoint is working"
          else
            echo "✗ Health endpoint failed"
            exit 1
          fi

      - name: Upload Coverage Reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: api/coverage.xml
          fail_ci_if_error: false
